<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- 🔰 TAB LOGO (FAVICON) -->
<link rel="icon" href="logo.jpeg" />

<title>FloodGuard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;    
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",system-ui;
}

body{
height:100vh;
overflow:hidden;
background:radial-gradient(circle at top,#0b1d33,#020815);
color:white;
}

/* Layers */
#rain{position:absolute;inset:0;z-index:1;}
#lightning{position:absolute;inset:0;z-index:2;}
#water{position:absolute;inset:0;z-index:3;pointer-events:none;}

.flash{
position:absolute;
inset:0;
background:rgba(255,255,255,.9);
opacity:0;
z-index:4;
pointer-events:none;
}

/* 🔰 TOP LOGO BAR */
.header{
position:fixed;
top:14px;
left:20px;
z-index:6;
display:flex;
align-items:center;
gap:10px;
}

.header img{
width:36px;
height:36px;
border-radius:50%;
}

.header span{
font-size:18px;
font-weight:600;
letter-spacing:0.5px;
}

/* UI */
.overlay{
position:relative;
z-index:5;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
opacity:0;
transform:translateY(20px);
transition:.9s;
}

h1{
font-size:3rem;
margin-bottom:15px;
}

p{
max-width:700px;
opacity:.85;
margin-bottom:20px;
}

.btn{
padding:16px 40px;
border-radius:40px;
border:none;
background:linear-gradient(135deg,#007bff,#00d4ff);
color:white;
font-size:1.1rem;
cursor:pointer;
box-shadow:0 0 25px rgba(0,160,255,.6);
margin:10px;
}

</style>
</head>

<body>

<!-- 🔰 TOP LOGO -->
<div class="header">
  <img src="logo.jpeg" alt="FloodGuard Logo">
  <span>FloodGuard</span>
</div>

<canvas id="rain"></canvas>
<canvas id="lightning"></canvas>
<canvas id="water"></canvas>

<div class="flash" id="flash"></div>

<!-- UI -->
<div class="overlay" id="overlay">
  <h1>FloodGuard</h1>
  <p>AI-powered street-level flood prediction and safe route navigation</p>

  <!-- 🔗 REDIRECT TO MAIN APP -->
  <a href="http://localhost:3000" style="text-decoration:none;">
    <button class="btn">Get Started</button>
  </a>

  <p style="font-size:14px;opacity:0.7;">
    Choose the safest path, not the fastest!
  </p>
</div>

<script>

/* ================= SETUP ================= */

const rain=document.getElementById("rain");
const lightning=document.getElementById("lightning");
const water=document.getElementById("water");

const ctx=rain.getContext("2d");
const lctx=lightning.getContext("2d");
const wctx=water.getContext("2d");

const flash=document.getElementById("flash");
const overlay=document.getElementById("overlay");

let W,H;

function resize(){
W=rain.width=lightning.width=water.width=window.innerWidth;
H=rain.height=lightning.height=water.height=window.innerHeight;
}
window.addEventListener("resize",resize);
resize();

/* ================= RAIN ================= */

const drops=[...Array(260)].map(() => ({
x:Math.random()*W,
y:Math.random()*H,
l:6+Math.random()*10,
s:1.5+Math.random()*2,
a:.25+Math.random()*.2
}));

const splashes=[];
function createSplash(x,y){
for(let i=0;i<6;i++){
splashes.push({
x,y,
vx:(Math.random()-0.5)*2,
vy:-Math.random()*2,
life:20
});
}
}

function drawSplashes(){
for(let i=splashes.length-1;i>=0;i--){
const s=splashes[i];
ctx.fillStyle="rgba(180,220,255,0.8)";
ctx.beginPath();
ctx.arc(s.x,s.y,2,0,Math.PI*2);
ctx.fill();
s.x+=s.vx;
s.y+=s.vy;
s.vy+=0.1;
s.life--;
if(s.life<=0) splashes.splice(i,1);
}
}

function drawRain(){
ctx.clearRect(0,0,W,H);
drops.forEach(d=>{
ctx.strokeStyle=`rgba(140,200,255,${d.a})`;
ctx.beginPath();
ctx.moveTo(d.x,d.y);
ctx.lineTo(d.x,d.y+d.l);
ctx.stroke();
d.y+=d.s;

if(d.y>waterBaseY){
createSplash(d.x,waterBaseY);
d.y=-20;
d.x=Math.random()*W;
}
});
drawSplashes();
requestAnimationFrame(drawRain);
}

/* ================= LIGHTNING ================= */

function drawLightning(){
lctx.clearRect(0,0,W,H);
let x=Math.random()*W;
let y=0;
lctx.strokeStyle="rgba(255,255,255,.95)";
lctx.lineWidth=2;
lctx.beginPath();
lctx.moveTo(x,y);
while(y<H*0.8){
x+=(Math.random()-.5)*40;
y+=20+Math.random()*30;
lctx.lineTo(x,y);
}
lctx.stroke();
flash.style.opacity=.9;
setTimeout(()=>flash.style.opacity=0,120);
setTimeout(()=>lctx.clearRect(0,0,W,H),200);
}
setInterval(drawLightning,6000);

/* ================= WATER ================= */

let time=0;
let level=0;
let mouseX=0;
let mouseY=0;
let waterBaseY=H;

document.addEventListener("mousemove",e=>{
mouseX=e.clientX;
mouseY=e.clientY;
});

function drawWater(){
wctx.clearRect(0,0,W,H);
level=Math.min(level+0.04,H*0.35);
waterBaseY=H-level;

wctx.beginPath();
for(let x=0;x<=W;x++){
let wave=
Math.sin((x+time*2)/40)*12+
Math.sin((x+time)/20)*6;

let dx=x-mouseX;
let dy=waterBaseY-mouseY;
let dist=Math.sqrt(dx*dx+dy*dy);

let repel=0;
if(dist<130){
repel=(130-dist)*0.6;
}

let y=waterBaseY+wave+repel;
wctx.lineTo(x,y);
}
wctx.lineTo(W,H);
wctx.lineTo(0,H);
wctx.closePath();

const grad=wctx.createLinearGradient(0,waterBaseY,0,H);
grad.addColorStop(0,"#1fa2ff");
grad.addColorStop(1,"#003f88");

wctx.fillStyle=grad;
wctx.fill();
time+=1.2;
requestAnimationFrame(drawWater);
}

/* ================= START ================= */

drawRain();
drawWater();

window.onload=()=>{
setTimeout(()=>{
overlay.style.opacity=1;
overlay.style.transform="translateY(0)";
},800);
};

</script>

</body>
</html>
